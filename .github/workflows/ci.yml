name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (Lint, Typecheck, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and Format (Biome CI)
        run: bunx biome ci .

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build